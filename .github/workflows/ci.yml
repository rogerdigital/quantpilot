name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── 1. Lint + static checks + typecheck ───────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run check:workspaces
      - run: npm run check:lockfile
      - run: npm run check:no-js-source
      - run: npm run check:runtime-env
      - run: npm run lint
      - run: npm run typecheck

  # ── 2. Tests (parallel matrix) ────────────────────────────────────────────
  test:
    name: Test / ${{ matrix.suite }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - engine
          - api
          - web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      # better-sqlite3 may need to compile from source if no prebuilt matches
      - name: Install build tools (for native addons)
        run: sudo apt-get install -y python3 make g++
      - run: npm ci
      - run: npm run test:${{ matrix.suite }}

  # ── 3. Security audit ────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      # Audit production dependencies only; dev-only build tooling (vite, etc.)
      # is not shipped in the SPA bundle and is tracked via routine upgrades.
      - run: npm audit --omit=dev --audit-level=high

  # ── 4. Build + bundle size ───────────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Report bundle size
        run: |
          echo "## Bundle Size Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          du -sh apps/web/dist/ >> "$GITHUB_STEP_SUMMARY"
          du -sh apps/web/dist/assets/ >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Top 10 largest chunks:" >> "$GITHUB_STEP_SUMMARY"
          ls -lhS apps/web/dist/assets/*.js | head -10 | awk '{printf "%s\t%s\n", $5, $9}' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Check bundle size limits
        run: |
          TOTAL_KB=$(du -sk apps/web/dist/assets/ | cut -f1)
          THRESHOLD=1500
          echo "Total assets: ${TOTAL_KB}KB (threshold: ${THRESHOLD}KB)"
          if [ "$TOTAL_KB" -gt "$THRESHOLD" ]; then
            echo "::warning::Bundle size ${TOTAL_KB}KB exceeds ${THRESHOLD}KB threshold"
          fi
