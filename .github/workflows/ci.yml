name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check workspace integrity
        run: npm run check:workspaces

      - name: Check lockfile sync
        run: npm run check:lockfile

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Control Plane Tests
        run: npm run test:control-plane

      - name: Control Plane Runtime Tests
        run: npm run test:runtime

      - name: Task Workflow Engine Tests
        run: npm run test:engine

      - name: API Tests
        run: npm run test:api

      - name: Worker Tests
        run: npm run test:worker

      - name: Build app
        run: npm run build
