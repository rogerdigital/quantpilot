name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── 1. Lint + static checks + typecheck ───────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run check:workspaces
      - run: npm run check:lockfile
      - run: npm run check:no-js-source
      - run: npm run check:runtime-env
      - run: npm run lint
      - run: npm run typecheck

  # ── 2. Tests (parallel matrix) ────────────────────────────────────────────
  test:
    name: Test / ${{ matrix.suite }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - control-plane
          - runtime
          - engine
          - api
          - worker
          - web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      # better-sqlite3 may need to compile from source if no prebuilt matches
      - name: Install build tools (for native addons)
        run: sudo apt-get install -y python3 make g++
      - run: npm ci
      - run: npm run test:${{ matrix.suite }}

  # ── 3. Build ──────────────────────────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
